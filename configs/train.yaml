# @package _global_
#
# Base training config (Hydra). A `task` selects a `data` + `model` group and
# overrides any of the global fields below. Compose & run with:
#   accelerate launch scripts/train_hydra.py task=robocasa_all_tshape_mot
# Override anything from the CLI, e.g.:
#   ... task=robocasa_all_tshape_mot train.max_epochs=1 data.batch_size_per_gpu=4

defaults:
  - _self_
  - data: null
  - model: null
  - task: null

# --- experiment identity / output ---
exp_name: gwp_mot
date_str: ${oc.env:date,default}
output_root: ${oc.env:GWP_MOT_OUTPUT_ROOT,/inspire/hdd/project/robot-dna/sunmingyang-240108120101/wam_locomanip/2_data_ckpt_cache/loco_manip/experiments}
project_dir: ${output_root}/experiments/${exp_name}_${date_str}

# trainer class (resolved by name in world_action_model)
runners:
  - MoTCasualWATrainerPretrain

wandb:
  project: ${oc.env:WANDB_PROJECT,gwp-mot}
  name: ${oc.env:WANDB_NAME,${exp_name}_${date_str}}
  mode: ${oc.env:WANDB_MODE,offline}
  init_timeout: ${oc.decode:${oc.env:WANDB_INIT_TIMEOUT,300}}

optimizers:
  type: CAME8Bit
  lr: ${pow:2,-14.5}
  weight_decay: 1e-2

schedulers:
  type: CosineScheduler
  warmup_steps: 1000
  decay_epochs: 5
  decay_lr: 4.0e-6

train:
  resume: false
  max_epochs: 5
  max_steps: 0
  gradient_accumulation_steps: 2
  mixed_precision: bf16
  checkpoint_interval: 5000
  save_full_state: false
  checkpoint_total_limit: -1
  checkpoint_safe_serialization: false
  checkpoint_strict: false
  dataloader_timeout_retries: 20
  log_interval: 2
  with_ema: true
  ema:
    enabled: true
    decay: 0.9999             # target / upper-bound decay (~10k-step averaging window)
    device: model
    # dynamic (step-adaptive) decay schedule. dynamic=false -> constant `decay`.
    dynamic: true
    min_decay: 0.0            # lower bound while ramping up
    update_after_step: 0      # delay EMA start by N steps
    use_ema_warmup: false     # false: decay=(1+t)/(10+t); true: inv-gamma (diffusers)
    inv_gamma: 1.0            # only used when use_ema_warmup=true
    power: 0.6666666666666666 # only used when use_ema_warmup=true
  activation_checkpointing: false
  activation_class_names:
    - WanAttention

test: {}

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
