# @package _global_
#
# Derivative of robocasa_all_tshape_mot: train only on atomic-seen tasks for
# 2 epochs with per-epoch checkpoints. Replaces the legacy deepcopy+patch in
# configs/robocasa_all_tshape_mot_back4_joint.py with a small override.

defaults:
  - override /data: robocasa_all_tshape
  - override /model: mot
  - _self_

exp_name: robocasa_atomic_seen_tshape_mot_back4_joint

data:
  task_filter: atomic_seen

model:
  checkpoint: null
  freeze_action: false
  use_gt_action_for_video: false
  action_loss_weight: 1.0
  visual_loss_weight: 1.0

train:
  max_epochs: 2
  checkpoint_interval: 5000
  checkpoint_epoch_interval: 1
