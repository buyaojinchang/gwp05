# @package _global_
#
# Heat-food joint/action restart: inherit the gwp_v0 base task, narrow data to
# the single heat_food task, init from the video-pretrain EMA checkpoint, and
# run a fresh 5-epoch joint/action training with robust dataloader timeouts.

defaults:
  - gwp_v0_heat_food_fold_shirt_mot
  - _self_

exp_name: gwp_v0_heat_food_mot_joint_from_videopt_5ep
date_str: ${oc.env:date,heat_food_joint5ep_restart}

data:
  task_names:
    - heat_food
  norm_path: ${data.data_root}/heat_food/norm_stats_delta.json
  sample_timeout_sec: ${oc.decode:${oc.env:LEROBOT_SAMPLE_TIMEOUT_SEC,120}}
  max_sample_retries: ${oc.decode:${oc.env:LEROBOT_MAX_SAMPLE_RETRIES,5}}
  timeout: ${oc.decode:${oc.env:LEROBOT_DATALOADER_TIMEOUT_SEC,300}}
  num_workers: ${oc.decode:${oc.env:LEROBOT_NUM_WORKERS,8}}
  prefetch_factor: ${oc.decode:${oc.env:LEROBOT_PREFETCH_FACTOR,4}}

model:
  checkpoint: ${oc.env:MOT_STAGE1_CHECKPOINT,/shared_disk/users/hengtao.li/codex/gwp-mot/experiments/gwp_v0_heat_food_fold_shirt_mot_video_pt_0530_videopt_e1_g8_h20_online/checkpoint-17890/model_ema.pt}
  strict: false
  freeze_action: false
  use_gt_action_for_video: false
  action_loss_weight: 1.0
  visual_loss_weight: 1.0

wandb:
  mode: ${oc.env:WANDB_MODE,online}

schedulers:
  decay_epochs: 5

train:
  max_epochs: ${oc.decode:${oc.env:GWP_MAX_EPOCHS,5}}
  max_steps: ${oc.decode:${oc.env:GWP_MAX_STEPS,0}}
  checkpoint_interval: ${oc.decode:${oc.env:GWP_CHECKPOINT_INTERVAL,5000}}
  checkpoint_epoch_interval: 1
  process_group_timeout_sec: ${oc.decode:${oc.env:TORCH_DISTRIBUTED_TIMEOUT_SEC,3600}}
